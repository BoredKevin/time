<div class="container" id="login-container">
    <h1>Login</h1>
    <div class="box">
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Budi Santoso">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="primary">Masuk</button>
            <p id="login-error" style="color: var(--color-danger); margin-top: 1rem; display: none;"></p>
        </form>
    </div>
</div>

<div class="container hidden" id="app-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Remote Control</h2>
        <button id="logout-btn" style="width: auto; padding: var(--space-2) var(--space-4);">Logout</button>
    </div>

    <div class="box">
        <div class="status-badge" style="background: var(--color-primary); color: var(--color-bg);">SEDANG DIPUTAR</div>
        <h3 id="current-title">Tidak ada media</h3>
        <p id="current-type" style="font-size: var(--text-xs); color: var(--color-text-faint); margin-bottom: var(--space-4);"></p>
        
        <div class="flex-row">
            <button id="vote-skip-btn">Vote Skip (<span id="skip-count">0</span>/3)</button>
            <button id="vote-fullscreen-btn">Vote Fullscreen (<span id="fs-count">0</span>/3)</button>
        </div>
    </div>

    <div class="box">
        <h3>Tambah Antrean</h3>
        <form id="add-queue-form">
            <div class="form-group">
                <label for="yt-url">YouTube URL</label>
                <input type="url" id="yt-url" required placeholder="https://youtube.com/watch?v=...">
            </div>
            <button type="submit" class="primary">Tambah ke Antrean</button>
        </form>
    </div>

    <div class="box">
        <h3>Antrean</h3>
        <div id="queue-list">
            <p style="color: var(--color-text-muted);">Antrean kosong.</p>
        </div>
    </div>

    <div class="box admin-section hidden" id="admin-tools">
        <h3>TV Controls</h3>
        <div class="flex-row" style="margin-bottom: var(--space-4);">
            <button id="admin-fs-btn">Toggle Fullscreen</button>
            <button id="admin-blackout-btn" class="danger">Toggle Blackout</button>
            <button id="admin-skip-btn">Force Skip</button>
        </div>

        <hr style="border-color: var(--color-border); margin: var(--space-4) 0;">

        <h3>Live Stream / Interrupt</h3>
        <form id="interrupt-form" style="margin-bottom: var(--space-4);">
            <div class="form-group">
                <label for="interrupt-url">VDO.ninja URL or YouTube URL</label>
                <input type="url" id="interrupt-url" required placeholder="https://vdo.ninja/?view=...">
            </div>
            <button type="submit" class="danger">Play Now (Interrupt)</button>
        </form>

        <hr style="border-color: var(--color-border); margin: var(--space-4) 0;">

        <h3>Broadcast Message</h3>
        <form id="broadcast-form">
            <div class="form-group">
                <label for="broadcast-msg">Pesan</label>
                <input type="text" id="broadcast-msg" required placeholder="PENGUMUMAN: ...">
            </div>
            <button type="submit">Kirim Broadcast</button>
        </form>

        <hr style="border-color: var(--color-border); margin: var(--space-4) 0;">

        <h3>Edit Schedule</h3>
        <p style="font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: var(--space-4);">To edit the schedule safely, please edit the JSON structure below and save.</p>
        <textarea id="schedule-json" rows="10" style="font-family: var(--font-display); font-size: var(--text-xs); margin-bottom: var(--space-2);"></textarea>
        <button id="save-schedule-btn" class="primary">Simpan Jadwal</button>
    </div>
</div>
