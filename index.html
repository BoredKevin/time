<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital XI - Cravion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* Base styles */
        :root {
            /* Text sizes */
            --text-xs: clamp(0.7rem, 1.5vmin, 0.875rem);
            --text-sm: clamp(0.8rem, 1.8vmin, 1rem);
            --text-base: clamp(0.9rem, 2vmin, 1.125rem);
            --text-lg: clamp(1rem, 2.5vmin, 1.5rem);
            --text-xl: clamp(1.2rem, 3.5vmin, 2.25rem);
            --text-2xl: clamp(1.5rem, 5vmin, 3.5rem);
            --text-hero: clamp(3rem, 10vmin, 8rem);

            /* Spacing */
            --space-2: 0.5rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 3rem;

            /* Radii */
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;

            /* Fonts */
            --font-display: 'JetBrains Mono', 'Courier New', monospace;
            --font-body: 'Space Grotesk', 'Helvetica Neue', sans-serif;
        }

        /* Themes */
        :root,
        [data-theme="dark"] {
            --color-bg: #0d0f10;
            --color-surface: #111416;
            --color-border: #2e3840;
            --color-text: #d0dce6;
            --color-text-muted: #6b8090;
            --color-text-faint: #3e5060;
            --color-primary: #00c8d4;
        }

        [data-theme="light"] {
            --color-bg: #f0f4f8;
            --color-surface: #f8fafb;
            --color-border: #b8c8d6;
            --color-text: #1a2530;
            --color-text-muted: #4a6070;
            --color-text-faint: #8aa0b0;
            --color-primary: #0090a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background-color: var(--color-bg);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2vmin;
            transition: background-color 0.4s ease, color 0.4s ease;
            position: relative;
        }

        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% 50%, oklch(from var(--color-primary) l c h / 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, oklch(from var(--color-text) l c h / 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: var(--space-6);
            right: var(--space-6);
            z-index: 100;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            color: var(--color-text);
            border-color: var(--color-text);
        }

        /* Main Layout */
        .container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 2vmin;
            margin-top: 1vmin;
        }

        .header {
            text-align: center;
            margin-bottom: 1vmin;
        }

        .header-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--color-text-muted);
            line-height: 1.2;
            padding-top: 0.1em;
        }

        .header-subtitle {
            font-size: var(--text-lg);
            font-weight: 400;
            color: var(--color-text-faint);
            margin-top: var(--space-2);
        }

        .box {
            border: 2px solid var(--color-border);
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: 3vmin;
            transition: border-color 0.4s ease, background 0.4s ease;
        }

        /* Time Section */
        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3vmin;
            flex-shrink: 1;
        }

        .clock-display {
            font-family: var(--font-display);
            font-size: var(--text-hero);
            font-weight: 300;
            line-height: 1;
            text-shadow: 0 0 60px oklch(from var(--color-primary) l c h / 0.25);
        }

        .clock-display .separator {
            color: var(--color-primary);
            opacity: 0.7;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 0.1;
            }
        }

        .seconds-bar-wrap {
            width: min(480px, 90vw);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-top: var(--space-4);
        }

        .seconds-label {
            font-family: var(--font-display);
            font-size: var(--text-sm);
            color: var(--color-text-faint);
            min-width: 2ch;
        }

        .seconds-bar-track {
            flex: 1;
            height: 2px;
            background: var(--color-border);
            border-radius: 99px;
            overflow: hidden;
        }

        .seconds-bar-fill {
            height: 100%;
            background: var(--color-primary);
            width: 0%;
            transition: width 0.9s linear;
        }

        /* Bottom Grid */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2vmin;
            flex: 1;
            min-height: 0;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 2vmin;
            min-height: 0;
        }

        .date-box {
            font-size: var(--text-xl);
            font-weight: 400;
            color: var(--color-text-muted);
            text-align: left;
            flex-shrink: 0;
        }

        .date-box .day-name {
            color: var(--color-primary);
            font-weight: 500;
        }

        .schedule-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex: 1;
            container-type: inline-size;
        }

        .schedule-box::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--schedule-accent, var(--color-primary));
            transition: background 0.6s ease;
        }

        .schedule-label {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--color-text-faint);
            margin-bottom: var(--space-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .schedule-period {
            display: none;
        }

        .schedule-text {
            font-size: clamp(1.2rem, 8cqw, 3.5rem);
            font-weight: 500;
            color: var(--color-text);
            line-height: 1.1;
        }

        .schedule-sub {
            display: none;
        }

        .next-schedule-box {
            opacity: 0.7;
        }

        .photo-box {
            padding: 0;
            aspect-ratio: 4/3;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .footer {
            margin-top: auto;
            padding: var(--space-6) 0;
            text-align: center;
            color: var(--color-text-faint);
            font-size: var(--text-sm);
            z-index: 1;
        }

        @media (max-width: 768px) {
            .bottom-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: var(--text-xl);
            }
        }
    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" data-theme-toggle aria-label="Ganti tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
    </button>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="header-title">Welcome to XI - Cravion • Teknik Informatika</h1>
            <h2 class="header-subtitle">time.boredkevin.com</h2>
        </header>

        <!-- Time Section -->
        <section class="box time-box">
            <div class="clock-display" id="clock" aria-live="polite" aria-atomic="true">
                00<span class="separator">:</span>00<span class="separator">:</span>00
            </div>
            <div class="seconds-bar-wrap">
                <span class="seconds-label" id="sec-label">00</span>
                <div class="seconds-bar-track">
                    <div class="seconds-bar-fill" id="sec-bar"></div>
                </div>
            </div>
        </section>

        <!-- Bottom Grid -->
        <div class="bottom-grid">
            <div class="left-col">
                <!-- Date Box -->
                <div class="box date-box">
                    <span class="day-name" id="day-name">—</span>, <span id="date-full">—</span>
                </div>

                <!-- Current Schedule Box -->
                <div class="box schedule-box" id="current-schedule-box">
                    <div class="schedule-label">Jadwal Sekarang</div>
                    <div class="schedule-period" id="schedule-period">MEMUAT...</div>
                    <div class="schedule-text" id="schedule-text">—</div>
                    <div class="schedule-sub" id="schedule-sub"></div>
                </div>

                <!-- Next Schedule Box -->
                <div class="box schedule-box next-schedule-box" id="next-schedule-box">
                    <div class="schedule-label">Jadwal Berikutnya</div>
                    <div class="schedule-period" id="next-schedule-period">—</div>
                    <div class="schedule-text" id="next-schedule-text">—</div>
                    <div class="schedule-sub" id="next-schedule-sub"></div>
                </div>
            </div>

            <!-- Right Col: Photo Box -->
            <div class="box photo-box">
                <!-- You can replace the src attribute with any real image URL. This uses placehold.co for a fast placeholder that matches the dark theme. -->
                <img src="https://placehold.co/800x600/111416/00c8d4?text=XI - C" alt="4:3 photo box" />
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Copyright &copy; <span id="current-year"></span> BoredKevin. All rights reserved.</p>
    </footer>

    <script>
        // ===========================
        //  JADWAL HARIAN 
        // ===========================
        const scheduleData = {
            "Senin": [
                { start: "00:00", sub: "Di Luar Jam Sekolah" },
                { start: "07:00", sub: "Upacara Bendera" },
                { start: "07:45", sub: "FISIKA" },
                { start: "09:15", sub: "BAHASA JAWA" },
                { start: "10:00", sub: "ISTIRAHAT" },
                { start: "10:15", sub: "BAHASA JAWA" },
                { start: "11:00", sub: "B. INGGRIS TINGKAT LANJUT" },
                { start: "11:45", sub: "ISTIRAHAT / ISHOMA" },
                { start: "12:15", sub: "B. INGGRIS TINGKAT LANJUT" },
                { start: "13:45", sub: "MATEMATIKA" },
                { start: "15:00", sub: "Pulang" }
            ],
            "Selasa": [
                { start: "00:00", sub: "Di Luar Jam Sekolah" },
                { start: "07:00", sub: "SEJARAH" },
                { start: "08:30", sub: "INFORMATIKA" },
                { start: "10:00", sub: "ISTIRAHAT" },
                { start: "10:15", sub: "INFORMATIKA" },
                { start: "11:00", sub: "MATEMATIKA TINGKAT LANJUT" },
                { start: "11:45", sub: "ISTIRAHAT / ISHOMA" },
                { start: "12:15", sub: "MATEMATIKA TINGKAT LANJUT" },
                { start: "13:45", sub: "B. INGGRIS TINGKAT LANJUT" },
                { start: "15:00", sub: "Pulang" }
            ],
            "Rabu": [
                { start: "00:00", sub: "Di Luar Jam Sekolah" },
                { start: "07:00", sub: "PENJASKES" },
                { start: "09:15", sub: "SENI BUDAYA" },
                { start: "10:00", sub: "ISTIRAHAT" },
                { start: "10:15", sub: "SENI BUDAYA" },
                { start: "11:00", sub: "BAHASA INDONESIA" },
                { start: "11:45", sub: "ISTIRAHAT / ISHOMA" },
                { start: "12:15", sub: "BAHASA INDONESIA" },
                { start: "13:00", sub: "FISIKA" },
                { start: "15:00", sub: "Pulang" }
            ],
            "Kamis": [
                { start: "00:00", sub: "Di Luar Jam Sekolah" },
                { start: "07:00", sub: "BHS INGGRIS" },
                { start: "09:15", sub: "Pend. Agama Islam BP" },
                { start: "10:00", sub: "ISTIRAHAT" },
                { start: "10:15", sub: "Pend. Agama Islam BP" },
                { start: "11:45", sub: "ISTIRAHAT / ISHOMA" },
                { start: "12:15", sub: "PPKn" },
                { start: "13:45", sub: "MATEMATIKA" },
                { start: "15:15", sub: "Pulang" }
            ],
            "Jumat": [
                { start: "00:00", sub: "Di Luar Jam Sekolah" },
                { start: "07:00", sub: "BAHASA INDONESIA" },
                { start: "08:30", sub: "INFORMATIKA" },
                { start: "10:00", sub: "ISTIRAHAT" },
                { start: "10:15", sub: "BK" },
                { start: "11:00", sub: "MATEMATIKA TINGKAT LANJUT" },
                { start: "11:45", sub: "ISTIRAHAT / ISHOMA" },
                { start: "12:15", sub: "MATEMATIKA TINGKAT LANJUT" },
                { start: "13:00", sub: "PRAKARYA" },
                { start: "14:30", sub: "Pulang" }
            ],
            "Sabtu": [
                { start: "00:00", sub: "Libur / Akhir Pekan" }
            ],
            "Minggu": [
                { start: "00:00", sub: "Libur / Akhir Pekan" }
            ]
        };
        // ===========================

        const DAYS_ID = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const MONTHS_ID = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function getCurrentSchedule(dayName, h, m) {
            const now = h * 60 + m;
            const schedule = scheduleData[dayName] || scheduleData["Senin"];
            for (let i = 0; i < schedule.length; i++) {
                const current = schedule[i];
                const next = schedule[i + 1];

                if (next) {
                    if (now >= timeToMinutes(current.start) && now < timeToMinutes(next.start)) {
                        return { current, next };
                    }
                } else {
                    // Last schedule of the current day
                    if (now >= timeToMinutes(current.start)) {
                        let tomorrowIdx = (DAYS_ID.indexOf(dayName) + 1) % 7;
                        let tomorrowName = DAYS_ID[tomorrowIdx];
                        let tomorrowSchedule = scheduleData[tomorrowName] || scheduleData["Senin"];
                        return { current, next: tomorrowSchedule[0] };
                    }
                }
            }
            return { current: schedule[0], next: schedule[1] || schedule[0] };
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        const clockEl = document.getElementById('clock');
        const secBar = document.getElementById('sec-bar');
        const secLabel = document.getElementById('sec-label');
        const dayNameEl = document.getElementById('day-name');
        const dateFullEl = document.getElementById('date-full');

        // Current Schedule Elements
        const currentBox = document.getElementById('current-schedule-box');
        const schedulePeriod = document.getElementById('schedule-period');
        const scheduleText = document.getElementById('schedule-text');
        const scheduleSub = document.getElementById('schedule-sub');

        // Next Schedule Elements
        const nextBox = document.getElementById('next-schedule-box');
        const nextSchedulePeriod = document.getElementById('next-schedule-period');
        const nextScheduleText = document.getElementById('next-schedule-text');
        const nextScheduleSub = document.getElementById('next-schedule-sub');

        document.getElementById('current-year').textContent = new Date().getFullYear();

        let lastScheduleKey = '';

        function tick() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const dayName = DAYS_ID[now.getDay()];

            // Clock
            clockEl.innerHTML =
                `${pad(h)}<span class="separator">:</span>${pad(m)}<span class="separator">:</span>${pad(s)}`;

            // Seconds bar
            const pct = (s / 60) * 100;
            secBar.style.width = pct + '%';
            secLabel.textContent = pad(s);

            // Date
            dayNameEl.textContent = dayName;
            dateFullEl.textContent = `${now.getDate()} ${MONTHS_ID[now.getMonth()]} ${now.getFullYear()}`;

            // Schedule
            const { current, next } = getCurrentSchedule(dayName, h, m);
            const key = dayName + '-' + current.sub;

            if (key !== lastScheduleKey) {
                lastScheduleKey = key;

                // Update Current Schedule
                scheduleText.textContent = current.sub;
                currentBox.style.setProperty('--schedule-accent', 'var(--color-primary)');

                // Update Next Schedule
                nextScheduleText.textContent = next.sub + ` (${next.start})`;
                nextBox.style.setProperty('--schedule-accent', 'var(--color-primary)');
            }
        }

        // Initial call
        tick();
        setInterval(tick, 1000);

        // Theme toggle
        (function () {
            const btn = document.querySelector('[data-theme-toggle]');
            const root = document.documentElement;
            let dark = root.getAttribute('data-theme') === 'dark';

            function updateIcon() {
                btn.innerHTML = dark
                    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
                    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
                btn.setAttribute('aria-label', dark ? 'Ganti ke mode terang' : 'Ganti ke mode gelap');
            }

            updateIcon();

            btn.addEventListener('click', () => {
                dark = !dark;
                root.setAttribute('data-theme', dark ? 'dark' : 'light');
                updateIcon();
            });
        })();
    </script>
</body>

</html>
